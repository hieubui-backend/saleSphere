name: CD – Build & Push Docker Image

on:
  push:
    branches:
      - main    # Chỉ trigger khi push/merge vào main

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB: Build Docker image và push lên GitHub Container Registry
  # ─────────────────────────────────────────────────────────
  docker:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # Cần quyền này để push lên GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Trích xuất metadata (tags, labels) để gán cho Docker image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag "latest" cho mọi push vào main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag theo SHA commit (ví dụ: sha-abc1234) – immutable, dùng cho CD
            type=sha,prefix=sha-,format=short

      # Login vào GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bật BuildKit cache để tăng tốc build lần sau
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build và push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layer từ lần build trước (tăng tốc ~50%)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # In ra thông tin image vừa push để dễ theo dõi
      - name: Print image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Tags: ${{ steps.meta.outputs.tags }}"
          echo "🔗 URL: https://ghcr.io/${{ github.repository }}"
