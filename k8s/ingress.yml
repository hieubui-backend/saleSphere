apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: salesphere-ingress
  namespace: salesphere
  annotations:
    # Nginx Ingress Controller
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket support cho Socket.io
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Tự động cấp SSL từ Let's Encrypt (cần cài cert-manager trước)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Bỏ comment phần tls khi đã có domain và cert-manager
  # tls:
  #   - hosts:
  #       - api.your-domain.com
  #     secretName: salesphere-tls
  rules:
    - # host: api.your-domain.com   # Bỏ comment khi có domain thật
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: salesphere-service
                port:
                  number: 80
