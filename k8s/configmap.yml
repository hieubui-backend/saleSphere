apiVersion: v1
kind: ConfigMap
metadata:
  name: salesphere-config
  namespace: salesphere
data:
  NODE_ENV: "production"
  PORT: "5000"
  # Redis URL sẽ được cấu hình trong deployment.yml để hỗ trợ variable expansion
  # Mail config (không nhạy cảm)
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "465"
  MAIL_FROM_ADDRESS: "SaleSphere <noreply@salesphere.com>"
