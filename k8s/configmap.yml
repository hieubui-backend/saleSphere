apiVersion: v1
kind: ConfigMap
metadata:
  name: salesphere-config
  namespace: salesphere
data:
  NODE_ENV: "production"
  PORT: "5000"
  # Redis trỏ đến service name trong cùng namespace
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@salesphere-redis:6379"
  # Mail config (không nhạy cảm)
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "465"
  MAIL_FROM_ADDRESS: "SaleSphere <noreply@salesphere.com>"
