apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesphere-app
  namespace: salesphere
  labels:
    app: salesphere-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salesphere-app
  # Zero-downtime rolling update
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Tạo 1 pod mới trước khi xóa pod cũ
      maxUnavailable: 0  # Luôn giữ đủ replicas → không bị downtime
  template:
    metadata:
      labels:
        app: salesphere-app
    spec:
      # Pull image từ GHCR (GitHub Container Registry)
      imagePullSecrets:
        - name: ghcr-secret   # Tạo bằng: kubectl create secret docker-registry ghcr-secret ...

      containers:
        - name: app
          # Image sẽ được CD pipeline cập nhật tự động (kustomize / kubectl set image)
          image: ghcr.io/hieubui-backend/salesphere:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

          # Load biến từ ConfigMap và Secret
          envFrom:
            - configMapRef:
                name: salesphere-config
            - secretRef:
                name: salesphere-secrets

          env:
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@salesphere-redis:6379"

          # Giới hạn tài nguyên (quan trọng để HPA hoạt động đúng)
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Health checks
          # initialDelaySeconds phải đủ lớn để server.listen() hoàn tất
          livenessProbe:
            httpGet:
              path: /          # / luôn trả 200 khi app đang chạy (kể cả khi DB chưa kết nối)
              port: 5000
            initialDelaySeconds: 30   # Chờ 30s trước lần check đầu tiên
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /health    # /health trả 503 khi MongoDB chưa sẵn sàng
              port: 5000
            initialDelaySeconds: 15   # Server đã listen rồi, chỉ cần chờ DB
            periodSeconds: 10
            failureThreshold: 12      # 12 lần × 10s = 120s để thử lại
            timeoutSeconds: 5
