# ⚠️  FILE NÀY KHÔNG ĐƯỢC COMMIT LÊN GIT
# Tạo Secret thủ công trên cluster bằng lệnh:
#
#   kubectl create secret generic salesphere-secrets \
#     --namespace=salesphere \
#     --from-literal=MONGO_URI="mongodb+srv://..." \
#     --from-literal=JWT_SECRET="your_secret" \
#     --from-literal=SESSION_SECRET="your_session_secret" \
#     --from-literal=REDIS_PASSWORD="your_redis_password" \
#     --from-literal=PAYOS_CLIENT_ID="..." \
#     --from-literal=PAYOS_API_KEY="..." \
#     --from-literal=PAYOS_CHECKSUM_KEY="..." \
#     --from-literal=MAIL_USERNAME="your@gmail.com" \
#     --from-literal=MAIL_PASSWORD="your_app_password"
#
# Hoặc dùng file YAML này CHỈ ĐỂ THAM KHẢO cấu trúc.
# Trên production thực tế, dùng Sealed Secrets hoặc External Secrets Operator.

apiVersion: v1
kind: Secret
metadata:
  name: salesphere-secrets
  namespace: salesphere
type: Opaque
stringData:
  MONGO_URI: "REPLACE_WITH_REAL_VALUE"
  JWT_SECRET: "REPLACE_WITH_REAL_VALUE"
  SESSION_SECRET: "REPLACE_WITH_REAL_VALUE"
  REDIS_PASSWORD: "REPLACE_WITH_REAL_VALUE"
  PAYOS_CLIENT_ID: "REPLACE_WITH_REAL_VALUE"
  PAYOS_API_KEY: "REPLACE_WITH_REAL_VALUE"
  PAYOS_CHECKSUM_KEY: "REPLACE_WITH_REAL_VALUE"
  MAIL_USERNAME: "REPLACE_WITH_REAL_VALUE"
  MAIL_PASSWORD: "REPLACE_WITH_REAL_VALUE"
