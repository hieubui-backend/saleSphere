events {
    worker_connections 1024;
}

http {
    # Giới hạn kích thước request body (upload ảnh)
    client_max_body_size 10M;

    # Cấu hình upstream (Node.js app)
    upstream salesphere_app {
        server app:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;   # catch-all – nhận mọi domain/IP

        # ─── Static files – phục vụ trực tiếp từ Nginx (nhanh hơn Node.js) ───
        location /uploads/ {
            alias /app/public/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /images/ {
            alias /app/public/images/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ─── API & WebSocket ───────────────────────────────────────────────────
        location / {
            proxy_pass http://salesphere_app;
            proxy_http_version 1.1;

            # Headers chuẩn
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support cho Socket.io
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeout
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
